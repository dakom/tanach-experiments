name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    working-directory: utils/calculations

jobs:
  check:
    name: test-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: utils/calculations

      - name: Format
        run: cargo fmt --all -- --check

      # Lint both feature configs: default (embedded dataset) and the dev build
      # that loads the dataset from src/media/ on disk.
      - name: Clippy (embedded)
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy (no embed)
        run: cargo clippy --all-targets --no-default-features -- -D warnings

      - name: Build (release)
        run: cargo build --release

name: Release

# Rebuild and publish the prebuilt `calculations` binaries on every merge to
# master. Assets are attached to a rolling `latest` GitHub Release, so
# https://github.com/dakom/tanach-experiments/releases/latest/download/... always
# serves the newest build.
on:
  push:
    branches: [master]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: utils/calculations
      - name: Build
        working-directory: utils/calculations
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        working-directory: utils/calculations
        run: |
          set -eu
          name="calculations-${{ matrix.target }}"
          bin="calculations"
          [ "${{ runner.os }}" = "Windows" ] && bin="calculations.exe"
          mkdir "$name"
          cp "target/${{ matrix.target }}/release/$bin" "$name/"
          tar -czf "$GITHUB_WORKSPACE/$name.tar.gz" "$name"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: calculations-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Assemble release assets
        run: |
          set -eu
          mkdir -p release
          cp artifacts/*.tar.gz release/
          cp utils/calculations/install.sh  release/calculations-installer.sh
          cp utils/calculations/install.ps1 release/calculations-installer.ps1
          (cd release && sha256sum *.tar.gz > SHA256SUMS)
          ls -la release
      - name: Publish rolling 'latest' release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          # Replace the rolling release so `latest` always points at this build.
          gh release delete latest --cleanup-tag --yes 2>/dev/null || true
          gh release create latest release/* \
            --title "latest" \
            --notes "Prebuilt \`calculations\` binaries, rebuilt from ${GITHUB_SHA} on $(date -u +%Y-%m-%dT%H:%M:%SZ)." \
            --latest \
            --target "${GITHUB_SHA}"
